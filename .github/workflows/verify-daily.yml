name: verify-daily

# Daily full two-tier verify (latency + download speed) on GitHub Actions runner.
# Single job — 3677 nodes takes ~4h (< 6h job limit). Runs once daily at 05:00 UTC.
# fetch-and-publish workflow handles fetch/parse/emit/publish every 30min; this
# only refreshes alive/latency/download_speed, then re-publishes alive nodes.

on:
  schedule:
    - cron: '17 5 * * *'   # daily ~05:17 UTC (off-round-minute)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: free-proxy-publish-production
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5h cap (< 6h Actions limit, covers ~4h full verify)
    steps:
      - name: Checkout # zizmor: ignore[artipacked] This job must commit and push its verified output snapshot.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.5'
          cache: false

      - name: Cache clash-speedtest binary
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/go/bin
          key: clash-speedtest-v1.8.8-${{ runner.os }}-${{ runner.arch }}-go1.26.5

      - name: Install clash-speedtest
        run: |
          BIN_DIR="$(go env GOPATH)/bin"
          if [ ! -x "$BIN_DIR/clash-speedtest" ]; then
            go install github.com/faceair/clash-speedtest@v1.8.8
          fi
          echo "$BIN_DIR" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch + parse (refresh nodes before verify)
        run: |
          python src/aggregator/cli.py fetch
          python src/aggregator/cli.py parse

      - name: Two-tier verify (latency + download speed)
        run: python src/aggregator/cli.py verify

      - name: Re-emit with alive-only + download_speed sort
        run: python src/aggregator/cli.py emit

      - name: Validate emitted snapshot
        run: |
          python src/aggregator/cli.py validate-output-status
          clash-speedtest -c output/clash.yaml -fast -f 'a^' -timeout 1ms
          python - <<'PY'
          import base64, json, pathlib, xml.etree.ElementTree as ET
          root = pathlib.Path('output')
          json.loads((root / 'singbox.json').read_text(encoding='utf-8'))
          base64.b64decode((root / 'v2ray-base64.txt').read_text().strip(), validate=True)
          ET.parse(root / 'feed.xml')
          PY

      - name: Publish top-N verified nodes to Worker (strict)
        run: python src/aggregator/cli.py publish --strict
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Commit updated state + output
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          # state/last-run.json + state/live.jsonl are gitignored (runtime artifacts)
          # — adding them warns + can exit 1; only commit the output snapshot.
          git add output/
          git diff --staged --quiet || git commit -m "daily verify $(date -u +'%Y-%m-%d %H:%M')"
          # Concurrent pushes can reject our push; pull --rebase then push w/ retry.
          git pull --rebase --autostash
          if ! git push; then
            sleep 5
            git pull --rebase --autostash
            git push
          fi
          git rev-parse HEAD > output/pages-commit-sha.txt

      - name: Upload exact published Pages snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: published-output
          path: |
            output/clash.yaml
            output/singbox.json
            output/v2ray-base64.txt
            output/feed.xml
            output/pipeline-status.json
            output/_headers
            output/pages-commit-sha.txt
          if-no-files-found: error
          retention-days: 2

      - name: Purge jsDelivr CDN (if published via raw)
        env:
          CDN_REF: ${{ github.ref_name }}
          CDN_REPOSITORY: ${{ github.repository }}
        run: |
          for f in clash.yaml singbox.json v2ray-base64.txt feed.xml pipeline-status.json; do
            curl -sX PURGE "https://cdn.jsdelivr.net/gh/${CDN_REPOSITORY}@${CDN_REF}/output/$f" || true
          done
        continue-on-error: true
