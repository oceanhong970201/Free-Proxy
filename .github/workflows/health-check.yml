name: health-check

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: health-check-${{ github.event.repository.default_branch }}
  cancel-in-progress: false

jobs:
  health:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Worker /health
        id: ping
        env:
          WORKER_URL: ${{ vars.WORKER_BASE_URL }}
        run: |
          if [ -z "$WORKER_URL" ]; then
            echo "http_code=config-missing" >> "$GITHUB_OUTPUT"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          health_url="${WORKER_URL%/}/health"
          code=$(curl --silent --show-error --output /tmp/health.json \
            --write-out "%{http_code}" --max-time 30 "$health_url") || code=transport-error
          echo "http_code=$code" >> "$GITHUB_OUTPUT"
          cat /tmp/health.json || true
          if [ "$code" != "200" ] || ! jq -e '.ok == true' /tmp/health.json >/dev/null 2>&1; then
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          HTTP_CODE: ${{ steps.ping.outputs.http_code }}
          WORKER_URL: ${{ vars.WORKER_BASE_URL }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = 'Worker health check failed';
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            const existing = openIssues.find(issue => !issue.pull_request && issue.title === title);
            const healthUrl = `${(process.env.WORKER_URL || '').replace(/\/+$/, '')}/health`;
            const body = [
              `Worker \`${healthUrl}\` returned HTTP \`${process.env.HTTP_CODE}\`.`,
              `Run: ${runUrl}`,
              `Observed: ${new Date().toISOString()}`
            ].join('\n\n');
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }

      - name: Close resolved health issue
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = 'Worker health check failed';
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            for (const issue of openIssues.filter(item => !item.pull_request && item.title === title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Health recovered with JSON \`ok:true\` in run ${context.runId}.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
            }
