name: fetch-and-publish

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # was 30; verify adds ~4min, keep margin under 6h limit
    concurrency:
      group: aggregate
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true   # speeds up clash-speedtest install via module cache

      - name: Cache clash-speedtest binary
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: clash-speedtest-${{ runner.os }}-go1.22

      - name: Install clash-speedtest
        run: |
          if ! command -v clash-speedtest >/dev/null 2>&1; then
            go install github.com/faceair/clash-speedtest@latest
          fi
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch + Parse + Emit
        run: |
          python src/aggregator/cli.py fetch
          python src/aggregator/cli.py parse
          python src/aggregator/cli.py emit
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}

      - name: Two-tier verify (latency + download speed)
        run: python src/aggregator/cli.py verify
        continue-on-error: true   # partial verify results still publishable
        env:
          HOME: ${{ github.workspace }}   # GOPATH/bin on PATH for clash-speedtest

      - name: Re-emit with alive-only + download_speed sort
        run: python src/aggregator/cli.py emit

      - name: Publish alive nodes to Worker (strict, fallback non-strict)
        run: python src/aggregator/cli.py publish --strict
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # state/last-run.json is gitignored (avoids rebase conflicts) — don't add it,
          # `git add` on an ignored path exits 1 and fails the step.
          git add output/
          git diff --staged --quiet || git commit -m "auto update $(date -u +'%Y-%m-%d %H:%M')"
          # Concurrent pushes (manual or another scheduled run) can reject our
          # push. Pull --rebase (code commits touch different files than our
          # output/ snapshot, so rebase is clean) then push, with one retry.
          git pull --rebase --autostash || true
          git push || (sleep 5 && git pull --rebase --autostash && git push)

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PROJECT_NAME }}
          directory: output

      - name: Purge jsDelivr CDN
        continue-on-error: true
        run: |
          for f in clash.yaml singbox.json v2ray-base64.txt; do
            curl -sX PURGE "https://cdn.jsdelivr.net/gh/${{ github.repository }}@${{ github.ref_name }}/output/$f" || true
          done
