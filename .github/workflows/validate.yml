name: validate

on:
  push:
    paths-ignore:
      - 'output/**'
      - 'state/gray_nodes.jsonl'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate Python
        run: |
          python -m ruff check src tests
          python -m ruff format --check src tests
          python -m compileall -q src/aggregator tests
          python -W error -m pytest -q

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci
        working-directory: src/worker

      - name: Validate Worker
        run: |
          npm run typecheck
          npm test
        working-directory: src/worker
