name: validate

on:
  push:
    paths-ignore:
      - 'output/**'
      - 'state/gray_nodes.jsonl'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: src
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Python test dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate Python
        run: |
          python -m ruff check src tests
          python -m ruff format --check src tests
          python -m compileall -q src/aggregator tests
          python -W error -m pytest -q

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci
        working-directory: src/worker

      - name: Validate Worker
        run: |
          npm run typecheck
          npm test
        working-directory: src/worker
