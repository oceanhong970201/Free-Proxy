name: tg-recon

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: free-proxy-publish-production
  cancel-in-progress: false

jobs:
  tg-recon:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout # zizmor: ignore[artipacked] This job must commit and push the gray-node snapshot.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: TG web-preview recon
        run: python src/aggregator/cli.py tg-recon

      - name: Verify persisted result
        run: test -s state/gray_nodes.jsonl

      - name: Upload gray-node snapshot
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gray-nodes-${{ github.run_id }}
          path: state/gray_nodes.jsonl
          if-no-files-found: error
          retention-days: 14

      - name: Commit gray-node snapshot
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f state/gray_nodes.jsonl
          git diff --staged --quiet || git commit -m "tg-recon $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          if ! git push; then
            sleep 5
            git pull --rebase --autostash
            git push
          fi
