name: tg-recon

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: free-proxy-publish-production
  cancel-in-progress: false

jobs:
  tg-recon:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout # zizmor: ignore[artipacked] This job must commit and push the gray-node snapshot.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: TG web-preview recon
        run: python src/aggregator/cli.py tg-recon

      - name: Verify persisted result
        run: test -s state/gray_nodes.jsonl

      - name: Upload gray-node snapshot
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gray-nodes-${{ github.run_id }}
          path: state/gray_nodes.jsonl
          if-no-files-found: error
          retention-days: 14

      - name: Commit gray-node snapshot
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -f state/gray_nodes.jsonl
          git diff --staged --quiet || git commit -m "tg-recon $(date -u +'%Y-%m-%d %H:%M')"
          git pull --rebase --autostash
          if ! git push; then
            sleep 5
            git pull --rebase --autostash
            git push
          fi
