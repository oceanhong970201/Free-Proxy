name = "proxy-sub-aggregator"
main = "sub-aggregator.ts"
compatibility_date = "2025-01-01"

# D1 binding — create DB before deploy:
#   npx wrangler d1 create nodes-db
# then confirm or replace the database_id below for the target environment.
[[d1_databases]]
binding = "DB"
database_name = "nodes-db"
database_id = "1b837756-1913-43e7-b727-2d5a23bb8a78"

# KV binding — create namespace before deploy:
#   npx wrangler kv namespace create CACHE
# then confirm or replace the namespace id below for the target environment.
[[kv_namespaces]]
binding = "CACHE"
id = "a8cc252082fc4736b5e9ce897cd33f37"

# Cron trigger — every 2 hours
[triggers]
crons = ["0 */2 * * *"]

# Before deploy, set the import secret and initialize D1 from this directory:
#   npx wrangler secret put ADMIN_TOKEN
# Fresh DB only:
#   npx wrangler d1 execute nodes-db --remote --file=../../infra/d1/schema.sql
# Existing DB: follow infra/DEPLOY.md and apply 0002 then 0003 exactly once
# before deploying the atomic-snapshot Worker.
